<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prom '26 | Master DJ Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #e4e4e7;
        }

        .glass-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.5);
        }

        .search-glow:focus {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            border-color: #a855f7;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        .song-row:hover { background: rgba(39, 39, 42, 0.5); }
        
        /* Popularity Bar */
        .pop-bar-container {
            width: 100px;
            height: 6px;
            background: #27272a;
            border-radius: 4px;
            overflow: hidden;
        }
        .pop-bar-fill {
            height: 100%;
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="sticky top-0 z-50 glass-card border-b border-zinc-800 px-4 py-4">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row lg:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-purple-600 p-2 rounded-lg">
                    <i data-lucide="mic-2" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">PROM DATABASE</h1>
                    <p class="text-xs text-zinc-500 uppercase tracking-widest">Live Booth Control</p>
                </div>
            </div>

            <div class="flex-1 flex flex-col md:flex-row gap-3 w-full lg:max-w-3xl">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500"></i>
                    <input type="text" id="searchInput" placeholder="Search song or artist..." class="w-full bg-zinc-900 border border-zinc-700 rounded-xl py-2 pl-11 pr-4 outline-none transition-all search-glow text-zinc-100 text-sm">
                </div>
                
                <select id="genreFilter" class="bg-zinc-900 border border-zinc-700 rounded-xl py-2 px-3 outline-none text-sm text-zinc-200">
                    <option value="All">All Genres</option>
                    <option value="Pop">Pop</option>
                    <option value="Hip-Hop/Rap">Hip-Hop/Rap</option>
                    <option value="Country">Country</option>
                    <option value="Rock">Rock</option>
                    <option value="R&B/Soul">R&B/Soul</option>
                    <option value="Electronic/Dance">Electronic/Dance</option>
                </select>

                <select id="eraFilter" class="bg-zinc-900 border border-zinc-700 rounded-xl py-2 px-3 outline-none text-sm text-zinc-200">
                    <option value="All">All Eras</option>
                    <option value="1950s">1950s</option>
                    <option value="1960s">1960s</option>
                    <option value="1970s">1970s</option>
                    <option value="1980s">1980s</option>
                    <option value="1990s">1990s</option>
                    <option value="2000s">2000s</option>
                    <option value="2010s">2010s</option>
                    <option value="2020s">2020s</option>
                </select>

                <select id="sortFilter" class="bg-zinc-900 border border-zinc-700 rounded-xl py-2 px-3 outline-none text-sm text-zinc-200">
                    <option value="pop-desc">Top Hits First</option>
                    <option value="pop-asc">Deep Cuts First</option>
                    <option value="alpha-asc">A-Z</option>
                </select>
            </div>

            <button onclick="toggleCrate()" class="relative flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-xl transition-colors border border-zinc-700 whitespace-nowrap">
                <i data-lucide="list-music" class="w-5 h-5"></i>
                <span class="font-semibold text-sm">Booth Crate</span>
                <span id="crateCount" class="absolute -top-2 -right-2 bg-purple-600 text-white text-[11px] font-bold px-2 py-0.5 rounded-full min-w-[20px] text-center shadow-lg border border-zinc-900">0</span>
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 flex flex-col gap-6">
        <div class="flex items-center justify-between text-sm text-zinc-400 px-2">
            <span>Showing <span id="matchCount" class="text-white font-bold">0</span> tracks</span>
        </div>

        <div class="glass-card rounded-2xl overflow-hidden overflow-x-auto shadow-2xl">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="bg-zinc-900/80 text-zinc-400 text-xs uppercase tracking-wider border-b border-zinc-800">
                        <th class="px-6 py-4 font-semibold">Track</th>
                        <th class="px-6 py-4 font-semibold">Genre / Era</th>
                        <th class="px-6 py-4 font-semibold">Popularity</th>
                        <th class="px-6 py-4 font-semibold text-right">Queue</th>
                    </tr>
                </thead>
                <tbody id="songTableBody" class="divide-y divide-zinc-800/50">
                    </tbody>
            </table>
        </div>

        <div id="noResults" class="hidden flex-col items-center justify-center py-24 text-zinc-500">
            <i data-lucide="disc-3" class="w-16 h-16 mb-4 opacity-20"></i>
            <p class="text-lg">No tracks found matching those filters.</p>
        </div>
    </main>

    <div id="cratePanel" class="fixed inset-y-0 right-0 w-full max-w-sm bg-zinc-950 border-l border-zinc-800 transform translate-x-full transition-transform duration-300 z-[60] shadow-2xl flex flex-col">
        <div class="p-6 border-b border-zinc-800 flex items-center justify-between bg-zinc-900/50">
            <div class="flex items-center gap-3">
                <i data-lucide="list-music" class="w-6 h-6 text-purple-500"></i>
                <h2 class="text-xl font-bold">Up Next</h2>
            </div>
            <button onclick="toggleCrate()" class="text-zinc-500 hover:text-white p-2 bg-zinc-800 rounded-lg">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div id="crateList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-6 border-t border-zinc-800 bg-zinc-900">
            <button onclick="clearCrate()" class="w-full py-3 bg-red-900/20 text-red-400 hover:bg-red-900/40 rounded-xl font-semibold transition-colors border border-red-900/30">
                Clear Crate
            </button>
        </div>
    </div>

    <script>
        // Full processed database fetched from JSON
        let rawSongs = [];

        let crate = new Set();
        
        // DOM Elements
        const songTableBody = document.getElementById('songTableBody');
        const searchInput = document.getElementById('searchInput');
        const genreFilter = document.getElementById('genreFilter');
        const eraFilter = document.getElementById('eraFilter');
        const sortFilter = document.getElementById('sortFilter');
        const matchCount = document.getElementById('matchCount');
        const noResults = document.getElementById('noResults');
        const crateCount = document.getElementById('crateCount');
        const crateList = document.getElementById('crateList');
        const cratePanel = document.getElementById('cratePanel');

        async function init() {
            try {
                songTableBody.innerHTML = '<tr><td colspan="4" class="text-center py-12 text-zinc-500 font-semibold animate-pulse">Loading booth database...</td></tr>';
                
                const response = await fetch('songs.json');
                if (!response.ok) throw new Error('Failed to load songs');
                rawSongs = await response.json();
                
                renderSongs(getFilteredAndSortedSongs());
                lucide.createIcons();
                
                // Event Listeners
                searchInput.addEventListener('input', updateView);
                genreFilter.addEventListener('change', updateView);
                eraFilter.addEventListener('change', updateView);
                sortFilter.addEventListener('change', updateView);
            } catch (error) {
                console.error('Error loading songs:', error);
                songTableBody.innerHTML = '<tr><td colspan="4" class="text-center py-12 text-red-400 font-semibold border-t border-red-900/30 bg-red-900/10">Error loading database. Ensure songs.json is uploaded to your GitHub repository.</td></tr>';
            }
        }

        function updateView() {
            const filteredList = getFilteredAndSortedSongs();
            renderSongs(filteredList);
            matchCount.innerText = filteredList.length;
            
            if (filteredList.length === 0) {
                noResults.classList.remove('hidden');
                songTableBody.parentElement.classList.add('hidden');
            } else {
                noResults.classList.add('hidden');
                songTableBody.parentElement.classList.remove('hidden');
            }
        }

        function getFilteredAndSortedSongs() {
            const term = searchInput.value.toLowerCase();
            const genre = genreFilter.value;
            const era = eraFilter.value;
            const sort = sortFilter.value;

            let filtered = rawSongs.filter(s => {
                const matchesSearch = s.t.toLowerCase().includes(term) || s.a.toLowerCase().includes(term);
                const matchesGenre = genre === 'All' || s.g === genre;
                const matchesEra = era === 'All' || s.e === era;
                return matchesSearch && matchesGenre && matchesEra;
            });

            filtered.sort((a, b) => {
                if (sort === 'pop-desc') return b.p - a.p;
                if (sort === 'pop-asc') return a.p - b.p;
                if (sort === 'alpha-asc') return a.t.localeCompare(b.t);
                return 0;
            });

            return filtered;
        }

        function renderSongs(songList) {
            // Using a DocumentFragment for performant DOM updates
            const fragment = document.createDocumentFragment();
            
            songList.forEach(song => {
                const id = `${song.t}-${song.a}`.replace(/[^a-zA-Z0-9]/g, '');
                const isInCrate = crate.has(id);
                
                const tr = document.createElement('tr');
                tr.className = 'song-row transition-colors group border-b border-zinc-800/30';
                
                // Color code genres for quick visual scanning
                let genreColor = "text-zinc-400";
                if(song.g === 'Pop') genreColor = "text-pink-400";
                if(song.g === 'Hip-Hop/Rap') genreColor = "text-amber-400";
                if(song.g === 'Rock') genreColor = "text-red-400";
                if(song.g === 'Electronic/Dance') genreColor = "text-cyan-400";
                if(song.g === 'Country') genreColor = "text-green-400";
                if(song.g === 'R&B/Soul') genreColor = "text-purple-400";

                // Popularity Bar Color
                let popColor = "bg-green-500";
                if(song.p < 80) popColor = "bg-yellow-500";
                if(song.p < 60) popColor = "bg-red-500";

                tr.innerHTML = `
                    <td class="px-6 py-3">
                        <div class="flex flex-col">
                            <span class="font-bold text-zinc-100">${song.t}</span>
                            <span class="text-[11px] text-zinc-500 font-medium uppercase tracking-wider">${song.a}</span>
                        </div>
                    </td>
                    <td class="px-6 py-3">
                        <div class="flex flex-col gap-1">
                            <span class="text-xs font-semibold ${genreColor} bg-zinc-900 px-2 py-0.5 rounded-md w-max">${song.g}</span>
                            <span class="text-[11px] text-zinc-500">${song.e}</span>
                        </div>
                    </td>
                    <td class="px-6 py-3">
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-bold text-zinc-300 w-6">${song.p}</span>
                            <div class="pop-bar-container">
                                <div class="pop-bar-fill ${popColor}" style="width: ${song.p}%"></div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-3 text-right">
                        <button onclick="toggleCrateItem('${id}', '${song.t.replace(/'/g, "\\'")}', '${song.a.replace(/'/g, "\\'")}')" 
                                class="inline-flex p-2 rounded-xl transition-all ${isInCrate ? 'bg-purple-600/20 text-purple-400' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700 hover:text-white'}">
                            <i data-lucide="${isInCrate ? 'check' : 'plus'}" class="w-5 h-5"></i>
                        </button>
                    </td>
                `;
                fragment.appendChild(tr);
            });

            songTableBody.innerHTML = '';
            songTableBody.appendChild(fragment);
            lucide.createIcons();
        }

        // Crate Logic
        function toggleCrateItem(id, title, artist) {
            if (crate.has(id)) {
                crate.delete(id);
            } else {
                crate.add(id);
                // Store minimal data in a global object if needed, but we can reconstruct it
                window.crateData = window.crateData || {};
                window.crateData[id] = { title, artist };
            }
            updateCrateUI();
            updateView(); // Re-render to update the checkmark buttons
        }

        function updateCrateUI() {
            crateCount.innerText = crate.size;
            crateList.innerHTML = '';
            
            if (crate.size === 0) {
                crateList.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-zinc-600 gap-3 mt-20"><i data-lucide="inbox" class="w-12 h-12 opacity-50"></i><p>Crate is empty.</p></div>';
                lucide.createIcons();
                return;
            }

            Array.from(crate).forEach((id, index) => {
                const item = window.crateData[id];
                const div = document.createElement('div');
                div.className = 'glass-card p-3 rounded-xl flex items-center justify-between border-purple-900/30 group hover:border-purple-500/50 transition-colors';
                div.innerHTML = `
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="bg-zinc-900 text-zinc-500 font-bold w-6 h-6 flex items-center justify-center rounded text-xs">
                            ${index + 1}
                        </div>
                        <div class="flex-1 min-w-0 pr-2">
                            <p class="font-bold text-sm text-zinc-200 truncate">${item.title}</p>
                            <p class="text-[10px] text-zinc-500 uppercase truncate">${item.artist}</p>
                        </div>
                    </div>
                    <button onclick="toggleCrateItem('${id}')" class="p-2 text-zinc-600 hover:bg-red-900/20 hover:text-red-400 rounded-lg transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                crateList.appendChild(div);
            });
            lucide.createIcons();
        }

        function toggleCrate() {
            cratePanel.classList.toggle('translate-x-full');
            if (!cratePanel.classList.contains('translate-x-full')) {
                updateCrateUI();
            }
        }

        function clearCrate() {
            crate.clear();
            updateCrateUI();
            updateView();
        }

        window.onload = init;
    </script>
</body>
</html>
